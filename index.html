<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting…</title>

  <link id="canonical-link" rel="canonical" href="">
  <meta id="refresh-meta" http-equiv="refresh" content="0">

  <script>
    const TARGET_URL = "https://sparkle-studies.vercel.app/";

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("canonical-link").href = TARGET_URL;
      document.getElementById("refresh-meta").content = `0; url=${TARGET_URL}`;
      document.getElementById("open-link").href = TARGET_URL;
    });

    window.location.replace(TARGET_URL);
  </script>
</head>
<body>
  <p>
    Redirecting… If nothing happens,
    <a id="open-link" href="">open the site</a>.
  </p>
</body>
</html>
